name: Actualizador Nocturno Capa 2 (Hot Hand)

on:
  schedule:
    # Se ejecuta todos los días a las 09:00 UTC (Equivale a las 3:00 a.m. hora del Centro / Monterrey / Texas)
    - cron: '0 9 * * *'
  workflow_dispatch: # Este comando te pondrá un botón en GitHub para que lo puedas correr manualmente cuando quieras

jobs:
  extraccion-savant:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso crucial para que el bot pueda guardar el JSON en tu repo

    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependencias matemáticas
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy

      - name: ⚙️ Ejecutar Motor Asíncrono de Baseball Savant
        run: python hot_hand_updater.py

      - name: 💾 Guardar JSON y hacer Push al repositorio
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data_odds/hot_hand.json
          # El '|| true' evita que el proceso marque error si un día la MLB descansa y el JSON no cambia
          git commit -m "🤖 Auto-update: Métricas biomecánicas Hot Hand (Capa 2)" || true
          git push